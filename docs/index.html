<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <title>Switch Alert — GST / GMT / USDC</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="topbar">
    <h1>Switch Alert</h1>
    <div class="topbar-right">
      <span id="updated" class="updated">—</span>
      <button id="refresh-btn" class="icon-btn" title="Rafraîchir" aria-label="Rafraîchir">⟳</button>
    </div>
  </header>

  <main id="main">
    <section id="view-coins" class="view" aria-label="Cryptos suivies"></section>
    <section id="view-pairs" class="view hidden" aria-label="Paires surveillées"></section>
    <section id="view-alerts" class="view hidden" aria-label="Historique des alertes"></section>
    <section id="view-settings" class="view hidden" aria-label="Réglages"></section>
  </main>

  <nav class="tabbar" aria-label="Navigation">
    <button class="tab active" data-view="coins"><span class="tab-ico">📈</span>Cryptos</button>
    <button class="tab" data-view="pairs"><span class="tab-ico">🔀</span>Paires</button>
    <button class="tab" data-view="alerts"><span class="tab-ico">🔔</span>Alertes</button>
    <button class="tab" data-view="settings"><span class="tab-ico">⚙️</span>Réglages</button>
  </nav>

  <noscript><p style="padding:1rem">Cette application nécessite JavaScript.</p></noscript>
  <script type="module" src="js/app.js"></script>
</body>
</html>
